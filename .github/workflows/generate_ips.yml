name: Generate IP country lists

on:
  workflow_run:
    workflows:
      - "ip_checker.yml"
    types:
      - completed

permissions:
  contents: write

concurrency:
  group: generate-ips
  cancel-in-progress: false

jobs:
  generate:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests dnspython

      - name: Run regenerate_all to (re)generate IP files
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ ! -f scripts/regenerate_all.py ]; then
            echo "Error: scripts/regenerate_all.py not found" >&2
            exit 2
          fi
          python scripts/regenerate_all.py

      - name: Verify expected outputs
        run: |
          expected=(
            "ips_with_country/all_ips_with_country.txt"
            "ips_with_country/allowed_ips_with_country.txt"
            "ips_with_country/blocked_ips_with_country.txt"
            "ips_with_country/unreachable_ips_with_country.txt"
          )
          missing=()
          for f in "${expected[@]}"; do
            if [ ! -f "$f" ]; then
              missing+=("$f")
            fi
          done
          if [ ${#missing[@]} -ne 0 ]; then
            echo "Missing expected output files:" "${missing[@]}" >&2
            ls -la ips_with_country || true
            exit 3
          fi
          echo "All expected files exist."

      - name: Commit and push results
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore: generate ip country lists'
          branch: ${{ github.ref }}
          commit_user_name: github-actions[bot]
          commit_user_email: github-actions[bot]@users.noreply.github.com
