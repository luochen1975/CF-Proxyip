name: Generate IP country lists

on:
  workflow_run:
    workflows:
      - "ip_checker.yml"
    types:
      - completed

permissions:
  contents: write

concurrency:
  group: generate-ips
  cancel-in-progress: false

jobs:
  generate:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests dnspython geoip2 || pip install requests dnspython

      - name: Run regenerate_all (if present)
        run: |
          if [ -f scripts/regenerate_all.py ]; then
            echo "Running scripts/regenerate_all.py"
            python scripts/regenerate_all.py
          else
            echo "scripts/regenerate_all.py not found, skipping regenerate_all step"
          fi

      - name: Generate proxyip files (proxyip.txt / proxyip_with_country.txt)
        run: |
          if [ -f scripts/generate_proxyip_files.py ]; then
            echo "Running scripts/generate_proxyip_files.py"
            python scripts/generate_proxyip_files.py
          else
            echo "scripts/generate_proxyip_files.py not found, skipping proxyip generation"
          fi

      - name: Generate proxyip files (proxyip.txt / proxyip_with_country.txt)
        shell: powershell
        run: |
          Write-Host "Check ips/allowed_ips.txt existence:"
          if (Test-Path 'ips/allowed_ips.txt') {
             Get-Content ips/allowed_ips.txt -TotalCount 5
          } else {
            Write-Host "ips/allowed_ips.txt not found"
          }

          if (Test-Path 'scripts/generate_proxyip_files.py') {
            Write-Host "Running scripts/generate_proxyip_files.py"
            python scripts/generate_proxyip_files.py
            Write-Host "After running, check generated files:"
            if (Test-Path 'proxyip.txt') { Get-Content proxyip.txt -TotalCount 5 } else { Write-Host "proxyip.txt not found" }
            if (Test-Path 'proxyip_with_country.txt') { Get-Content proxyip_with_country.txt -TotalCount 5 } else { Write-Host "proxyip_with_country.txt not found" }
          } else {
            Write-Host "scripts/generate_proxyip_files.py not found, skipping"
          }
      
      - name: Verify expected outputs
        run: |
          expected=(
            "ips_with_country/all_ips_with_country.txt"
            "ips_with_country/allowed_ips_with_country.txt"
            "ips_with_country/blocked_ips_with_country.txt"
            "ips_with_country/unreachable_ips_with_country.txt"
            "proxyip.txt"
            "proxyip_with_country.txt"
          )
          missing=()
          for f in "${expected[@]}"; do
            if [ ! -f "$f" ]; then
              missing+=("$f")
            fi
          done
          if [ ${#missing[@]} -ne 0 ]; then
            echo "Missing expected output files:" "${missing[@]}" >&2
            ls -la ips_with_country || true
            ls -la . || true
            exit 3
          fi
          echo "All expected files exist."

      - name: Commit and push results
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore: generate ip country lists (including proxyip files)'
          branch: ${{ github.ref }}
          commit_user_name: github-actions[bot]
          commit_user_email: github-actions[bot]@users.noreply.github.com
