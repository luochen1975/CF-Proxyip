name: Generate IP country lists

on:
  workflow_run:
    workflows:
      - "ip_checker.yml"   # 触发者 workflow 的文件名（保持和你的 ip_checker.yml 文件名一致）
    types:
      - completed

permissions:
  contents: write

concurrency:
  group: generate-ips
  cancel-in-progress: false

jobs:
  generate:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests dnspython

      - name: Generate IP country files
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          python - <<'PY'
          import os, shutil, sys, time
          # Try to import helper functions from proxyip.py if available
          country_mapping = {}
          try:
              from proxyip import load_country_mapping, get_country_info, filter_ips_by_allowed_countries
              country_mapping = load_country_mapping('countries.txt')
          except Exception as e:
              # If proxyip.py is not importable, we'll fallback to simple ipinfo lookup below
              print("Warning: cannot import proxyip helpers:", e, file=sys.stderr)

          os.makedirs('ips_with_country', exist_ok=True)

          all_out = 'ips_with_country/all_ips_with_country.txt'
          ips_list = 'ips/all_ips.txt'
          proxy_with_country = 'proxyip_with_country.txt'
          proxy_plain = 'proxyip.txt'
          dns_script = 'DNS2Geo.py'

          def lookup_with_proxyip(ip):
              try:
                  if 'get_country_info' in globals() or 'get_country_info' in locals():
                      # use get_country_info if imported
                      return get_country_info(ip, country_mapping)
                  else:
                      raise Exception("no get_country_info")
              except Exception as e:
                  # fallback to ipinfo.io
                  import requests
                  try:
                      r = requests.get(f'https://ipinfo.io/{ip}/json', timeout=10)
                      if r.status_code == 200:
                          data = r.json()
                          code = data.get('country', '未知')
                          name = code
                          # try to use countries.txt if present
                          try:
                              if not country_mapping:
                                  # load basic mapping if possible
                                  if os.path.exists('countries.txt'):
                                      with open('countries.txt','r',encoding='utf-8') as f:
                                          for line in f:
                                              parts = line.strip().split(',')
                                              if len(parts)==2:
                                                  country_mapping[parts[0].strip()] = parts[1].strip()
                              name = country_mapping.get(code, code)
                          except Exception:
                              name = code
                          return f"{code}#{name}"
                      else:
                          return "未知"
                  except Exception as ex:
                      print("ipinfo lookup failed for", ip, ex, file=sys.stderr)
                      return "不可达"

          # 1) If all_out exists already, use it
          if os.path.exists(all_out):
              print("Using existing", all_out)
              input_file = all_out
          else:
              # 2) If ips/all_ips.txt exists, generate all_out from it
              if os.path.exists(ips_list):
                  print("Generating", all_out, "from", ips_list)
                  with open(ips_list, 'r', encoding='utf-8') as f:
                      ips = [ln.strip() for ln in f if ln.strip()]
                  with open(all_out, 'w', encoding='utf-8') as out:
                      for ip in ips:
                          info = None
                          try:
                              # try using proxyip.get_country_info if available
                              info = lookup_with_proxyip(ip)
                          except Exception as e:
                              print("lookup error:", e, file=sys.stderr)
                              info = "未知"
                          # normalize to IP#CountryName (keep fallback strings as-is)
                          if isinstance(info, str) and '#' in info:
                              out.write(f"{ip}#{info.split('#',1)[1]}\n")
                          else:
                              out.write(f"{ip}#{info}\n")
                  input_file = all_out
              elif os.path.exists(proxy_with_country):
                  print("Copying", proxy_with_country, "->", all_out)
                  shutil.copy(proxy_with_country, all_out)
                  input_file = all_out
              elif os.path.exists(proxy_plain):
                  # proxyip.txt may contain plain IPs — try to enrich
                  print("Generating", all_out, "from", proxy_plain)
                  with open(proxy_plain, 'r', encoding='utf-8') as f:
                      ips = [ln.strip() for ln in f if ln.strip()]
                  with open(all_out, 'w', encoding='utf-8') as out:
                      for ip in ips:
                          info = lookup_with_proxyip(ip)
                          if isinstance(info, str) and '#' in info:
                              out.write(f"{ip}#{info.split('#',1)[1]}\n")
                          else:
                              out.write(f"{ip}#{info}\n")
                  input_file = all_out
              else:
                  # 3) As a last resort, try running DNS2Geo.py (same as ip_checker) to produce outputs
                  if os.path.exists(dns_script):
                      print("Attempting to run", dns_script, "to produce IP lists")
                      rc = os.system(f"{sys.executable} {dns_script}")
                      time.sleep(2)
                      if os.path.exists(all_out):
                          input_file = all_out
                      elif os.path.exists(ips_list):
                          # loop back to generate from ips/all_ips.txt
                          with open(ips_list, 'r', encoding='utf-8') as f:
                              ips = [ln.strip() for ln in f if ln.strip()]
                          with open(all_out, 'w', encoding='utf-8') as out:
                              for ip in ips:
                                  info = lookup_with_proxyip(ip)
                                  if isinstance(info, str) and '#' in info:
                                      out.write(f"{ip}#{info.split('#',1)[1]}\n")
                                  else:
                                      out.write(f"{ip}#{info}\n")
                          input_file = all_out
                      else:
                          print("DNS2Geo did not produce expected files.", file=sys.stderr)
                          sys.exit(1)
                  else:
                      print("No source found to produce all_ips_with_country.txt. Searched:", all_out, ips_list, proxy_with_country, proxy_plain, dns_script, file=sys.stderr)
                      sys.exit(1)

          # Now call filter_ips_by_allowed_countries to produce allowed/blocked/unreachable with info
          # Ensure proxyip.filter_ips_by_allowed_countries is available; if not, implement a local fallback
          try:
              # If imported at top, this will call proxyip's function
              if 'filter_ips_by_allowed_countries' in globals() or 'filter_ips_by_allowed_countries' in locals():
                  filter_ips_by_allowed_countries(
                      input_file,
                      'allowed_countries.txt',
                      'ips_with_country/allowed_ips.txt',
                      'ips_with_country/blocked_ips.txt',
                      'ips_with_country/allowed_ips_with_country.txt',
                      'ips_with_country/blocked_ips_with_country.txt',
                      'ips_with_country/unreachable_ips.txt',
                      'ips_with_country/unreachable_ips_with_country.txt'
                  )
              else:
                  # Fallback implementation
                  print("Using local fallback for filtering by allowed countries")
                  allowed = set()
                  if os.path.exists('allowed_countries.txt'):
                      with open('allowed_countries.txt','r',encoding='utf-8') as f:
                          for line in f:
                              v=line.strip()
                              if v:
                                  allowed.add(v)
                  allowed_ips = []
                  blocked_ips = []
                  allowed_info = []
                  blocked_info = []
                  unreachable_ips = []
                  unreachable_info = []
                  with open(input_file, 'r', encoding='utf-8') as f:
                      for line in f:
                          line=line.strip()
                          if not line: continue
                          parts = line.split('#',1)
                          ip = parts[0].strip()
                          info = parts[1].strip() if len(parts)>1 else ''
                          if info == '不可达' or info == '未知' or not info:
                              unreachable_ips.append(ip)
                              unreachable_info.append(line)
                          else:
                              # try match by country code or name: allowed_countries.txt likely contains country codes or names
                              # check if info contains any allowed entry
                              matched = False
                              for a in allowed:
                                  if a and (a in info or a in line):
                                      matched = True
                                      break
                              if matched:
                                  allowed_ips.append(ip)
                                  allowed_info.append(line)
                              else:
                                  blocked_ips.append(ip)
                                  blocked_info.append(line)
                  # write files
                  with open('ips_with_country/allowed_ips_with_country.txt','w',encoding='utf-8') as f:
                      for l in allowed_info: f.write(l+"\n")
                  with open('ips_with_country/blocked_ips_with_country.txt','w',encoding='utf-8') as f:
                      for l in blocked_info: f.write(l+"\n")
                  with open('ips_with_country/unreachable_ips_with_country.txt','w',encoding='utf-8') as f:
                      for l in unreachable_info: f.write(l+"\n")
                  # also write plain IP lists (optional)
                  with open('ips_with_country/allowed_ips.txt','w',encoding='utf-8') as f:
                      for ip in allowed_ips: f.write(ip+"\n")
                  with open('ips_with_country/blocked_ips.txt','w',encoding='utf-8') as f:
                      for ip in blocked_ips: f.write(ip+"\n")
                  with open('ips_with_country/unreachable_ips.txt','w',encoding='utf-8') as f:
                      for ip in unreachable_ips: f.write(ip+"\n")

          except Exception as e:
              print("Error while filtering:", e, file=sys.stderr)
              sys.exit(1)

          # Confirm files exist
          expected = [
              'ips_with_country/all_ips_with_country.txt',
              'ips_with_country/allowed_ips_with_country.txt',
              'ips_with_country/blocked_ips_with_country.txt',
              'ips_with_country/unreachable_ips_with_country.txt'
          ]
          missing = [p for p in expected if not os.path.exists(p)]
          if missing:
              print("Missing expected output files:", missing, file=sys.stderr)
              sys.exit(1)
          else:
              print("All expected files generated:")
              for p in expected:
                  print(" -", p)
          PY

      - name: Commit and push results
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore: generate ip country lists'
          branch: ${{ github.ref }}
          commit_user_name: github-actions[bot]
          commit_user_email: github-actions[bot]@users.noreply.github.com
