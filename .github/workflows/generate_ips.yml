name: Generate IP country lists

on:
  workflow_run:
    workflows:
      - "ip_checker.yml"
    types:
      - completed

permissions:
  contents: write

concurrency:
  group: generate-ips
  cancel-in-progress: false

jobs:
  generate:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5.1
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests dnspython

      - name: Run regenerate_all to generate IP files
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python scripts/regenerate_all.py

      - name: Commit and push results
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore: generate ip country lists'
          branch: ${{ github.ref }}
          commit_user_name: github-actions[bot]
          commit_user_email: github-actions[bot]@users.noreply.github.com
