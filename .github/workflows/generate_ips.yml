name: Generate IP country lists

on:
  workflow_run:
    workflows:
      - "first.yml"         # <-- 如果你第一个 workflow 的文件名/显示名不是 first.yml，请修改这里
    types:
      - completed

permissions:
  contents: write

concurrency:
  group: generate-ips
  cancel-in-progress: false

jobs:
  generate:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt || pip install requests dnspython
          else
            pip install requests dnspython
          fi

      - name: Generate IP country files
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python - <<'PY'
          import os, shutil, sys
          # 依赖仓库根目录下的 proxyip.py
          try:
              from proxyip import load_country_mapping, get_country_info, filter_ips_by_allowed_countries
          except Exception as e:
              print("Cannot import helper functions from proxyip.py:", e, file=sys.stderr)
              raise

          os.makedirs('ips_with_country', exist_ok=True)

          country_mapping = load_country_mapping('countries.txt')

          all_out = 'ips_with_country/all_ips_with_country.txt'
          ips_list = 'ips/all_ips.txt'
          proxy_with_country = 'proxyip_with_country.txt'

          # 生成 all_ips_with_country.txt 的来源选择逻辑
          if os.path.exists(all_out):
              print('Using existing', all_out)
              input_file = all_out
          elif os.path.exists(ips_list):
              print('Generating', all_out, 'from', ips_list)
              with open(ips_list, 'r', encoding='utf-8') as f:
                  ips = [line.strip() for line in f if line.strip()]
              with open(all_out, 'w', encoding='utf-8') as out:
                  for ip in ips:
                      info = get_country_info(ip, country_mapping)
                      # get_country_info 可能返回 'US#美国' 或 '未知'/'不可达'
                      if isinstance(info, str) and '#' in info:
                          # 保留国家名称（#号后）
                          country_name = info.split('#',1)[1]
                          out.write(f"{ip}#{country_name}\n")
                      else:
                          out.write(f"{ip}#{info}\n")
              input_file = all_out
          elif os.path.exists(proxy_with_country):
              print('Copying', proxy_with_country, '->', all_out)
              shutil.copy(proxy_with_country, all_out)
              input_file = all_out
          else:
              print('No source found to produce all_ips_with_country.txt. Searched:', all_out, ips_list, proxy_with_country, file=sys.stderr)
              sys.exit(1)

          # 调用仓库中的过滤函数生成带国家信息的文件
          # filter_ips_by_allowed_countries(input_file, allowed_countries_file,
          #                                  allowed_ip_file, blocked_ip_file,
          #                                  allowed_with_info_file, blocked_with_info_file,
          #                                  unreachable_ip_file, unreachable_with_info_file)
          filter_ips_by_allowed_countries(
              input_file,
              'allowed_countries.txt',
              'ips_with_country/allowed_ips.txt',                        # 仅 IP（可选）
              'ips_with_country/blocked_ips.txt',                        # 仅 IP（可选）
              'ips_with_country/allowed_ips_with_country.txt',           # 带国家信息的允许列表（目标文件）
              'ips_with_country/blocked_ips_with_country.txt',           # 带国家信息的阻断列表（目标文件）
              'ips_with_country/unreachable_ips.txt',                    # 不可达 IP（可选）
              'ips_with_country/unreachable_ips_with_country.txt'        # 带国家信息的不可达列表（目标文件）
          )

          # 确保 all_out 存在（上面可能是复制过来的）
          if not os.path.exists(all_out):
              print('Expected output missing:', all_out, file=sys.stderr)
              sys.exit(1)

          print('Generated files under ips_with_country/')
          PY

      - name: Commit generated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ips_with_country/all_ips_with_country.txt \
                  ips_with_country/allowed_ips_with_country.txt \
                  ips_with_country/blocked_ips_with_country.txt \
                  ips_with_country/unreachable_ips_with_country.txt || true
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "ci: generate IP country lists"
            git push
          fi
