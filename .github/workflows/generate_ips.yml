name: Generate IP country lists

on:
  workflow_run:
    workflows:
      - "ip_checker.yml"   # 必须是触发源 workflow 的文件名（例如 .github/workflows/ip_checker.yml）
    types:
      - completed

permissions:
  contents: write

jobs:
  generate:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if exist requirements.txt (
            pip install -r requirements.txt || pip install requests dnspython
          ) else (
            pip install requests dnspython
          )

      - name: Generate IP country files
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python - <<'PY'
          import os, shutil, sys
          # 从 proxyip.py 导入必要函数；请保持 proxyip.py 的函数签名不变
          try:
              from proxyip import load_country_mapping, get_country_info, filter_ips_by_allowed_countries
          except Exception as e:
              print("Cannot import helper functions from proxyip.py:", e, file=sys.stderr)
              raise

          os.makedirs('ips_with_country', exist_ok=True)

          all_out = 'ips_with_country/all_ips_with_country.txt'
          ips_list = 'ips/all_ips.txt'
          proxy_with_country = 'proxyip_with_country.txt'

          # 优先使用已存在的 all_ips_with_country.txt（比如 DNS2Geo.py 已生成）
          if os.path.exists(all_out):
              print('Using existing', all_out)
              input_file = all_out
          elif os.path.exists(ips_list):
              print('Generating', all_out, 'from', ips_list)
              with open(ips_list, 'r', encoding='utf-8') as f:
                  ips = [line.strip() for line in f if line.strip()]
              with open(all_out, 'w', encoding='utf-8') as out:
                  country_mapping = load_country_mapping('countries.txt')
                  for ip in ips:
                      info = get_country_info(ip, country_mapping)
                      # get_country_info 可能返回 'US#美国' 或 '未知'/'不可达'
                      if isinstance(info, str) and '#' in info:
                          out.write(f"{ip}#{info.split('#',1)[1]}\n")
                      else:
                          out.write(f"{ip}#{info}\n")
              input_file = all_out
          elif os.path.exists(proxy_with_country):
              print('Copying', proxy_with_country, '->', all_out)
              shutil.copy(proxy_with_country, all_out)
              input_file = all_out
          else:
              print('No source found to produce all_ips_with_country.txt. Searched:', all_out, ips_list, proxy_with_country, file=sys.stderr)
              sys.exit(1)

          # 调用仓库中的过滤函数生成目标文件
          filter_ips_by_allowed_countries(
              input_file=input_file,
              allowed_countries_file='allowed_countries.txt',
              allowed_ip_file='ips_with_country/allowed_ips.txt',
              blocked_ip_file='ips_with_country/blocked_ips.txt',
              allowed_with_info_file='ips_with_country/allowed_ips_with_country.txt',
              blocked_with_info_file='ips_with_country/blocked_ips_with_country.txt',
              unreachable_ip_file='ips_with_country/unreachable_ips.txt',
              unreachable_with_info_file='ips_with_country/unreachable_ips_with_country.txt'
          )

          print('Generated files under ips_with_country/')
          PY

      - name: Commit and push results
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore: update IP/country info results'
          branch: ${{ github.ref }}
          commit_user_name: github-actions[bot]
          commit_user_email: github-actions[bot]@users.noreply.github.com
