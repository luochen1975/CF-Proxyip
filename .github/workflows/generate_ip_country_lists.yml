name: Generate IP country lists

on:
  workflow_run:
    workflows:
      - "ip_checker.yml"
    types:
      - completed

permissions:
  contents: write

concurrency:
  group: generate-ips
  cancel-in-progress: false

jobs:
  generate:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests dnspython

      - name: Generate proxyip files from existing ips_with_country data
        run: |
          if [ -f scripts/generate_proxyip_files.py ]; then
            echo "Running scripts/generate_proxyip_files.py"
            python scripts/generate_proxyip_files.py
          else
            echo "scripts/generate_proxyip_files.py not found, will try fallback"
            if [ -f ips/allowed_ips.txt ]; then
              cp ips/allowed_ips.txt proxyip.txt
              echo "Created proxyip.txt from ips/allowed_ips.txt"
            fi
            if [ -f ips_with_country/allowed_ips_with_country.txt ]; then
              cp ips_with_country/allowed_ips_with_country.txt proxyip_with_country.txt
              echo "Created proxyip_with_country.txt from ips_with_country/allowed_ips_with_country.txt"
            fi
          fi

      - name: Verify proxyip files exist
        run: |
          echo "=== Checking generated files ==="
          ls -la proxyip.txt proxyip_with_country.txt 2>/dev/null || echo "WARNING: proxyip files not found!"
          if [ -f proxyip.txt ]; then
            echo "proxyip.txt size: $(wc -l < proxyip.txt) lines"
            head -5 proxyip.txt
          fi
          if [ -f proxyip_with_country.txt ]; then
            echo "proxyip_with_country.txt size: $(wc -l < proxyip_with_country.txt) lines"
            head -5 proxyip_with_country.txt
          fi
          echo "=== Checking geo_cache.db ==="
          ls -la geo_cache.db 2>/dev/null || echo "geo_cache.db not found"

      - name: Verify expected outputs
        run: |
          expected=(
            "ips_with_country/all_ips_with_country.txt"
            "ips_with_country/allowed_ips_with_country.txt"
            "ips_with_country/blocked_ips_with_country.txt"
            "ips_with_country/unreachable_ips_with_country.txt"
            "proxyip.txt"
            "proxyip_with_country.txt"
          )
          missing=()
          for f in "${expected[@]}"; do
            if [ ! -f "$f" ]; then
              missing+=("$f")
            fi
          done
          if [ ${#missing[@]} -ne 0 ]; then
            echo "Missing expected output files:" "${missing[@]}" >&2
            ls -la ips_with_country || true
            ls -la . || true
            exit 3
          fi
          echo "All expected files exist."

      - name: Stage all changes including new files
        run: |
          # 关键：确保新文件被 git 跟踪
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add proxyip.txt proxyip_with_country.txt geo_cache.db ips/ ips_with_country/ || true
          git status

      - name: Commit and push results
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore: generate ip country lists (including proxyip files)'
          branch: ${{ github.ref }}
          commit_user_name: github-actions[bot]
          commit_user_email: github-actions[bot]@users.noreply.github.com
          # 关键：添加 file_pattern 确保这些文件被包含
          file_pattern: 'proxyip.txt proxyip_with_country.txt geo_cache.db ips/ ips_with_country/'
