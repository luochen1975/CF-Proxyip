name: Update IP lists (check + regenerate)

on:
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * *'

permissions:
  contents: write
  actions: read

jobs:
  update:
    concurrency:
      group: update-ip-lists
      cancel-in-progress: true
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install requirements
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install geoip2 || true

      - name: Optional: download GeoLite2 (if GEOLITE2_URL secret provided)
        env:
          GEOLITE2_URL: ${{ secrets.GEOLITE2_URL }}
        run: |
          if [ -n "$GEOLITE2_URL" ]; then
            mkdir -p geolite
            curl -L -o geolite/GeoLite2-Country.mmdb "$GE](#)*
