name: IP Checker

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */4 * * *'  # 每 4 小时运行一次

permissions:
  contents: write
  actions: read

jobs:
  check-ips:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        shell: powershell
        run: |
          python -m pip install --upgrade pip
          pip install requests dnspython
          pip install geoip2
          if ($LASTEXITCODE -ne 0) { Write-Host 'geoip2 install failed or not available, continuing' }

      - name: Merge & fetch IP lists (merge_and_filter_geoip or regenerate_all fallback)
        shell: powershell
        run: |
          if (Test-Path 'scripts/merge_and_filter_geoip.py') {
            Write-Host "Running scripts/merge_and_filter_geoip.py --write-all-with-country"
            python scripts/merge_and_filter_geoip.py --write-all-with-country
          } elseif (Test-Path 'scripts/regenerate_all.py') {
            Write-Host "Running scripts/regenerate_all.py"
            python scripts/regenerate_all.py
          } else {
            Write-Error "No suitable script found: scripts/merge_and_filter_geoip.py or scripts/regenerate_all.py"
            exit 1
          }

      - name: List directory contents (before DNS2Geo)
        shell: powershell
        run: |
          Write-Host "Root files:"
          Get-ChildItem -Force | Format-Table -AutoSize
          Write-Host "scripts directory:"
          if (Test-Path scripts) { Get-ChildItem scripts -Force | Format-Table -AutoSize } else { Write-Host "scripts not found" }
          Write-Host "ips_with_country:"
          if (Test-Path ips_with_country) { Get-ChildItem ips_with_country -Force | Format-Table -AutoSize } else { Write-Host "ips_with_country not found" }

      - name: Run DNS2Geo.py if present
        shell: powershell
        run: |
          if (Test-Path 'DNS2Geo.py') {
            Write-Host "Running DNS2Geo.py"
            python DNS2Geo.py
          } else {
            Write-Host "DNS2Geo.py not found, skipping"
          }

      - name: List directory contents (after)
        shell: powershell
        run: |
          Write-Host "ips_with_country after:"
          if (Test-Path ips_with_country) { Get-ChildItem ips_with_country -Force | Format-Table -AutoSize } else { Write-Host "ips_with_country not found" }
          Write-Host "ips directory:"
          if (Test-Path ips) { Get-ChildItem ips -Force | Format-Table -AutoSize } else { Write-Host "ips not found" }

      - name: Commit and push results
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore: update IP/country info results (ip_checker)'
          branch: ${{ github.ref }}
          commit_user_name: github-actions[bot]
          commit_user_email: github-actions[bot]@users.noreply.github.com
