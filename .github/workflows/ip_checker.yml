name: IP Checker

on:
  workflow_dispatch:
  schedule:
    - cron: '0 4,8,12,20,24 * * *'  # 每 12 小时运行一次

permissions:
  contents: write

jobs:
  check-ips:
    runs-on: ubuntu-latest  # 改为 Ubuntu，regenerate_all.py 不依赖 Windows

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip

      - name: Run regenerate_all.py
        run: python scripts/regenerate_all.py

      - name: List generated files
        run: |
          echo "=== Root files ==="
          ls -la proxyip.txt proxyip_with_country.txt geo_cache.json 2>/dev/null || echo "some files missing"
          echo "=== ips/ ==="
          ls -la ips/ 2>/dev/null || echo "ips/ not found"
          echo "=== ips_with_country/ ==="
          ls -la ips_with_country/ 2>/dev/null || echo "ips_with_country/ not found"

      - name: Commit and push results
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore: update IP lists and proxyip files'
          branch: ${{ github.ref }}
          commit_user_name: github-actions[bot]
          commit_user_email: github-actions[bot]@users.noreply.github.com
          file_pattern: 'proxyip.txt proxyip_with_country.txt geo_cache.json ips/ ips_with_country/'
