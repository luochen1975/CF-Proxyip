name: IP Checker

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */12 * * *'  # 每 12 小时一次（原示例）

permissions:
  contents: write
  actions: read

jobs:
  check-ips:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests dnspython

      - name: Fetch IP lists from urls.txt
        run: |
          python scripts/fetch_urls.py

      - name: List directory contents (before)
        run: |
          dir
          dir CloudflareScanner || echo "CloudflareScanner 目录不存在"

      - name: Run DNS2Geo.py
        run: python DNS2Geo.py

      - name: List directory contents (after)
        run: |
          dir
          dir CloudflareScanner || echo "CloudflareScanner 目录不存在"

      - name: Commit and push results
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore: update IP/country info results (ip_checker)'
          branch: ${{ github.ref }}
          commit_user_name: github-actions[bot]
          commit_user_email: github-actions[bot]@users.noreply.github.com
